<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Border Rings - Perfectly matching the original's thickness -->
    <circle cx="150" cy="150" r="140" stroke="#1B4D21" strokeWidth="6" />
    <circle cx="150" cy="150" r="115" stroke="#1B4D21" strokeWidth="4" />
    
    <!-- TEXT PATHS -->
    <path id="pathTop" d="M 50, 150 A 100,100 0 0,1 250,150" fill="none" />
    <path id="pathBottom" d="M 50, 150 A 100,100 0 0,0 250,150" fill="none" />

    <!-- TEXT: COOPÉRATIVE RÉGIONALE -->
    <text style="font-size:20px; font-weight:800; fill:#1B4D21; font-family:sans-serif;" text-transform="uppercase" letter-spacing="3px">
      <textPath href="#pathTop" startOffset="50%" text-anchor="middle">
        Coopérative Régionale
      </textPath>
    </text>

    <!-- TEXT: DES PLANTEURS ET AGRICULTEURS DE ZIGUINCHOR -->
    <text style="font-size:14px; font-weight:700; fill:#1B4D21; font-family:sans-serif;" text-transform="uppercase" letter-spacing="1.5px">
      <textPath href="#pathBottom" startOffset="50%" text-anchor="middle">
        des Planteurs et Agriculteurs de Ziguinchor
      </textPath>
    </text>

    <!-- SIDE TREE ICONS -->
    <g transform="translate(35, 150) scale(0.18)">
        <rect x="-4" y="0" width="8" height="40" fill="#4A2B15" />
        <circle cx="0" cy="-5" r="25" fill="#1B4D21" />
    </g>
    <g transform="translate(265, 150) scale(0.18)">
        <rect x="-4" y="0" width="8" height="40" fill="#4A2B15" />
        <circle cx="0" cy="-5" r="25" fill="#1B4D21" />
    </g>

    <!-- CENTRAL TREE - High Fidelity "Cloudy" Foliage -->
    <g transform="translate(150, 135)">
      <!-- Trunk -->
      <path d="M-8 65 L-12 65 L-5 0 L5 0 L12 65 L8 65 Z" fill="#4A2B15" />
      
      <!-- Foliage - Composed of many overlapping circles for that specific original look -->
      <circle cx="0" cy="0" r="55" fill="#1B4D21" />
      <circle cx="-35" cy="-5" r="35" fill="#1B4D21" />
      <circle cx="35" cy="-5" r="35" fill="#1B4D21" />
      <circle cx="-15" cy="-35" r="40" fill="#1B4D21" />
      <circle cx="15" cy="-35" r="40" fill="#1B4D21" />
      <circle cx="0" cy="-45" r="30" fill="#1B4D21" />
      
      <!-- Highlights to match the original gradient effect -->
      <circle cx="-10" cy="-20" r="15" fill="white" opacity="0.15" />
      <circle cx="15" cy="-10" r="12" fill="white" opacity="0.1" />
      <circle cx="0" cy="10" r="20" fill="white" opacity="0.05" />
    </g>

    <!-- CRPAZ ACRONYM -->
    <text
      x="150"
      y="225"
      text-anchor="middle"
      style="font-size:38px; font-weight:900; fill:#1B4D21; font-family:sans-serif; letter-spacing:1px;"
    >
      CRPAZ
    </text>
</svg>
